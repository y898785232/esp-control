<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能控制终端 Pro</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    body {text-align:center; font-family:sans-serif; background:#f0f2f5; padding:20px;}
    .card {background:white; max-width:400px; margin:auto; padding:20px; border-radius:15px; box-shadow:0 4px 10px rgba(0,0,0,0.1);}
    .btn {width:100%; height:50px; margin:10px 0; border-radius:10px; border:none; font-weight:bold; cursor:pointer;}
    .lamp-on {background:#ffc107;} .lamp-off {background:#e2e8f0;}
    .timer-section {margin-top:20px; border-top:1px solid #ddd; padding-top:20px; text-align:left;}
    .time-input {width:100%; height:40px; margin:5px 0; border:1px solid #ccc; border-radius:5px; font-size:18px;}
    .save-btn {background:#3b82f6; color:white;}
  </style>
</head>
<body>
  <div class="card">
    <div id="status" style="color:gray;">● 连接中...</div>
    <button class="btn" style="background:#10b981; color:white;" onclick="send('OPEN2')">🔓 远程开门</button>
    <button id="lampBtn" class="btn lamp-off" onclick="toggleLamp()">💡 灯 1</button>


    <div class="timer-section">
      <strong>🕒 分钟级定时设置</strong>
      <label class="switch" style="float:right;">
        <input type="checkbox" id="timerEnable"> 启用
      </label>
      <p>开始时间: <input type="time" id="startTime" class="time-input" value="15:00"></p>
      <p>结束时间: <input type="time" id="endTime" class="time-input" value="17:30"></p>
      <button class="btn save-btn" onclick="saveSettings()">💾 保存定时</button>
    </div>
  </div>


<script>
const client = mqtt.connect('wss://b7fea2bf.ala.asia-southeast1.emqxsl.com:8084/mqtt', {
  clientId: 'web_' + Math.random().toString(16).substr(2,8),
  username: 'eps8266nn', password: 'yu155414'
});


let lamp1State = false;
client.on('connect', () => { client.subscribe('home/esp8266/status'); });


client.on('message', (topic, message) => {
  const msg = message.toString();
  document.getElementById("status").style.color = "green";
  document.getElementById("status").innerHTML = "● 设备在线";


  if (msg === "ON1") { lamp1State = true; updateUI(); }
  if (msg === "OFF1") { lamp1State = false; updateUI(); }
  
  if (msg.startsWith("TIMER_INFO_")) {
    const parts = msg.split('_');
    document.getElementById("timerEnable").checked = (parts[2] === "1");
    document.getElementById("startTime").value = parts[3];
    document.getElementById("endTime").value = parts[4];
  }
});


function updateUI() {
  const btn = document.getElementById("lampBtn");
  btn.className = "btn " + (lamp1State ? "lamp-on" : "lamp-off");
  btn.innerText = "💡 灯 1 " + (lamp1State ? "已开启" : "已关闭");
}


function send(val) { client.publish('home/esp8266/cmd', val); }


function toggleLamp() { send(lamp1State ? 'OFF1' : 'ON1'); }


function saveSettings() {
  const isEnable = document.getElementById("timerEnable").checked ? 1 : 0;
  const start = document.getElementById("startTime").value;
  const end = document.getElementById("endTime").value;
  // 格式：SET_TIMER_1_15:00_17:30
  send(`SET_TIMER_${isEnable}_${start}_${end}`);
  alert("设置已下发！");
}
</script>
</body>
</html>
