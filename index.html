<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能控制终端 Pro</title>


<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>


<style>
body {
  text-align:center;
  font-family:Arial;
  background:#f0f2f5;
  padding:20px;
  color:#333;
}


.card {
  background:white;
  max-width:420px;
  margin:20px auto;
  padding:20px;
  border-radius:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}


.status {
  padding:6px 15px;
  border-radius:30px;
  font-weight:bold;
  display:inline-block;
  margin-bottom:20px;
}


.online {background:#28a745;color:white;}
.offline {background:#6c757d;color:white;}
.upgrading {background:#ff9800;color:white; animation:blink 1s infinite;}


@keyframes blink {
  0%{opacity:1;}50%{opacity:0.5;}100%{opacity:1;}
}


button {
  width:100%;
  height:55px;
  margin:10px 0;
  font-size:18px;
  border:none;
  border-radius:10px;
}


.ota {background:#ef4444;color:white;}
.lamp-on {background:#ffc107;}
.lamp-off {background:#e2e8f0;}
.open {background:#10b981;color:white;}
</style>
</head>


<body>


<div class="card">
  <h2>智能 IoT 控制面板</h2>
  <div id="status" class="status offline">设备离线</div>


  <button class="open" onclick="send('OPEN2')">远程开锁</button>
  <button id="lampBtn" class="lamp-off" onclick="toggleLamp()">灯：OFF</button>


  <button class="ota" onclick="triggerOTA()">远程升级 OTA</button>
</div>


<script>


const client = mqtt.connect(
'wss://b7fea2bf.ala.asia-southeast1.emqxsl.com:8084/mqtt',
{
  clientId: 'web_' + Math.random().toString(16).substr(2,8),
  username: 'eps8266nn',
  password: 'yu155414'
});


let lamp = false;
let otaLock = false;


client.on('connect', () => {
  client.subscribe('home/esp8266/status');
});


client.on('message', (topic, msg) => {


  const m = msg.toString();
  const s = document.getElementById("status");


  // ===== OTA 状态 =====
  if (m === "OTA_START") {
    s.className = "status upgrading";
    s.innerText = "固件升级中...";
    return;
  }


  if (m === "OTA_FAIL") {
    s.className = "status online";
    s.innerText = "在线";
    alert("OTA失败");
    return;
  }


  if (m === "OTA_OK") {
    s.className = "status online";
    s.innerText = "在线";
    return;
  }


  // ===== 正常状态 =====
  s.className = "status online";
  s.innerText = "设备在线";


  if (m === "ON1") {
    lamp = true;
    updateLamp();
  }


  if (m === "OFF1") {
    lamp = false;
    updateLamp();
  }
});


function updateLamp(){
  const b = document.getElementById("lampBtn");
  b.innerText = lamp ? "灯：ON" : "灯：OFF";
  b.className = lamp ? "lamp-on" : "lamp-off";
}


function send(cmd){
  client.publish("home/esp8266/cmd", cmd);
}


function toggleLamp(){
  send(lamp ? "OFF1" : "ON1");
}


function triggerOTA(){


  if (otaLock) return;
  otaLock = true;


  if (confirm("确定远程升级？设备将重启约30秒")) {
    send("DO_OTA_UPDATE");
  }


  setTimeout(()=> otaLock=false, 10000);
}


</script>


</body>
</html>
