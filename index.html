<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ESP8266 门禁控制</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    body {
      text-align: center;
      font-size: 28px;
      padding-top: 60px;
      font-family: Arial, sans-serif;
      background: #f0f2f5;
    }
    h2 { color: #333; margin-bottom: 40px; }


    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 360px;
      height: 150px;
    }


    .toggle-switch input { opacity: 0; width: 0; height: 0; }


    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc;
      border-radius: 75px;
      transition: 0.4s;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }


    .slider:before {
      position: absolute;
      content: "";
      height: 130px;
      width: 130px;
      left: 10px;
      bottom: 10px;
      background-color: white;
      border-radius: 50%;
      transition: 0.4s;
    }


    input:checked + .slider { background-color: #28a745; }
    input:checked + .slider:before { transform: translateX(200px); }


    .slider span {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 30px;
      font-weight: bold;
      color: white;
    }
    .off { left: 50px; }
    .on { right: 50px; opacity: 0; }
    input:checked + .slider .off { opacity: 0; }
    input:checked + .slider .on { opacity: 1; }
  </style>
</head>
<body>


  <h2>ESP8266 远程门禁</h2>


  <label class="toggle-switch">
    <input type="checkbox" id="lockSwitch" onchange="handleToggle(this)">
    <div class="slider">
      <span class="off">🔒 关</span>
      <span class="on">🔓 开</span>
    </div>
  </label>


  <br><br><br>
  <p><small>向右滑动开锁（0.3秒脉冲）</small></p>


<script>
const client = mqtt.connect('wss://b7fea2bf.ala.asia-southeast1.emqxsl.com:8084/mqtt', {
  clientId: 'web_' + Math.random().toString(16).substr(2,8),
  username: 'eps8266nn',
  password: 'yu155414'
});


client.on('connect', () => {
  console.log("MQTT 已连接");
  client.subscribe('home/esp8266/status');
});


client.on('message', (topic, message) => {
  if (message.toString() === "LOCK_TRIGGERED") {
    const sw = document.getElementById("lockSwitch");
    sw.checked = true;
    setTimeout(() => sw.checked = false, 1300);
  }
});


function handleToggle(cb) {
  if (cb.checked) {
    client.publish('home/esp8266/cmd', 'OPEN2');
  }
}
</script>


</body>
</html>
