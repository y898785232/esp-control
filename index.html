<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ESP8266 控制</title>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>

<body style="text-align:center;font-size:30px;padding-top:50px;">

<h2>ESP8266 远程控制</h2>

<button id="btn1"
onclick="sendMsg('ON1')"
style="width:220px;height:80px;font-size:28px;background:red;color:white;">
灯1
</button>

<br><br>

<button onclick="sendMsg('OFF1')"
style="width:220px;height:80px;font-size:28px;">
灯1关闭
</button>

<br><br>

<button id="btn2"
onclick="sendMsg('ON2')"
style="width:220px;height:80px;font-size:28px;background:red;color:white;">
灯2
</button>

<br><br>

<button onclick="sendMsg('OFF2')"
style="width:220px;height:80px;font-size:28px;">
灯2关闭
</button>
  
<script>

const options = {
  connectTimeout: 4000,
  clientId: 'web_' + Math.random().toString(16).substr(2,8),

  username: 'eps8266nn',
  password: 'yu155414'
}

const client = mqtt.connect(
'wss://b7fea2bf.ala.asia-southeast1.emqxsl.com:8084/mqtt',
options
)

client.on('connect', function () {
  client.subscribe('home/esp8266/status')
})

function sendMsg(msg) {
client.on('message', function(topic, message){

  let msg = message.toString()

  console.log("状态:", msg)

  if(msg == "ON1"){
    document.getElementById("btn1").style.background = "green"
  }

  if(msg == "OFF1"){
    document.getElementById("btn1").style.background = "gray"
  }

  if(msg == "ON2"){
    document.getElementById("btn2").style.background = "green"
  }

  if(msg == "OFF2"){
    document.getElementById("btn2").style.background = "gray"
  }

})
  client.publish(
    'home/esp8266/cmd',
    msg
  )

  console.log(msg)
}

</script>

</body>
</html>
