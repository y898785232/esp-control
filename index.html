<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ESP8266 智能控制</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    body {
      text-align: center;
      font-size: 28px;
      padding-top: 40px;
      font-family: Arial, sans-serif;
      background: #f0f2f5;
    }
    h2 { color: #333; margin: 20px 0 40px 0; }


    /* 滑动开关 - 门禁 */
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 360px;
      height: 150px;
      margin: 20px 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc;
      border-radius: 75px;
      transition: 0.4s;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 130px;
      width: 130px;
      left: 10px;
      bottom: 10px;
      background-color: white;
      border-radius: 50%;
      transition: 0.4s;
    }
    input:checked + .slider { background-color: #28a745; }
    input:checked + .slider:before { transform: translateX(200px); }


    .slider span {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 30px;
      font-weight: bold;
      color: white;
    }
    .off { left: 50px; }
    .on  { right: 50px; opacity: 0; }
    input:checked + .slider .off { opacity: 0; }
    input:checked + .slider .on  { opacity: 1; }


    /* 灯按钮 */
    button {
      width: 280px;
      height: 80px;
      font-size: 28px;
      margin: 12px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    .lamp-on  { background: #28a745; color: white; }
    .lamp-off { background: #dc3545; color: white; }
  </style>
</head>
<body>


  <h2>ESP8266 智能控制</h2>


  <!-- 电控锁 - 滑动开关 -->
  <p><strong>🔐 电控锁</strong></p>
  <label class="toggle-switch">
    <input type="checkbox" id="lockSwitch" onchange="handleLock(this)">
    <div class="slider">
      <span class="off">🔒 关</span>
      <span class="on">🔓 开</span>
    </div>
  </label>


  <br><br><hr><br>


  <!-- 灯1 控制 -->
  <p><strong>💡 灯 1</strong></p>
  <button id="lampBtn" class="lamp-off" onclick="toggleLamp()">灯 1 关</button>


<script>
const client = mqtt.connect('wss://b7fea2bf.ala.asia-southeast1.emqxsl.com:8084/mqtt', {
  clientId: 'web_' + Math.random().toString(16).substr(2,8),
  username: 'eps8266nn',
  password: 'yu155414'
});


let lamp1State = false;


client.on('connect', () => {
  console.log("MQTT 已连接");
  client.subscribe('home/esp8266/status');
});


client.on('message', (topic, message) => {
  const msg = message.toString();
  console.log("收到:", msg);


  if (msg === "LOCK_TRIGGERED") {
    const sw = document.getElementById("lockSwitch");
    sw.checked = true;
    setTimeout(() => { sw.checked = false; }, 1300);
  }


  if (msg === "ON1") {
    lamp1State = true;
    const btn = document.getElementById("lampBtn");
    btn.textContent = "灯 1 开";
    btn.className = "lamp-on";
  }
  if (msg === "OFF1") {
    lamp1State = false;
    const btn = document.getElementById("lampBtn");
    btn.textContent = "灯 1 关";
    btn.className = "lamp-off";
  }
});


function handleLock(cb) {
  if (cb.checked) {
    client.publish('home/esp8266/cmd', 'OPEN2');
  }
}


function toggleLamp() {
  if (lamp1State) {
    client.publish('home/esp8266/cmd', 'OFF1');
  } else {
    client.publish('home/esp8266/cmd', 'ON1');
  }
}
</script>


</body>
</html>
