<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>门禁 + 灯 控制</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    body {text-align:center; font-family:Arial,sans-serif; background:#f0f2f5; padding-top:40px;}
    h2 {color:#333;}
    .status {font-size:18px; padding:8px 16px; border-radius:20px; display:inline-block; margin:10px;}
    .online {background:#28a745; color:white;}
    .offline {background:#6c757d; color:white;}

    .toggle-switch {position:relative; display:inline-block; width:380px; height:160px; margin:20px;}
    .toggle-switch input {opacity:0; width:0; height:0;}
    .slider {position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:#ccc; border-radius:80px; transition:0.4s;}
    .slider:before {position:absolute; content:""; height:140px; width:140px; left:10px; bottom:10px; background:white; border-radius:50%; transition:0.4s;}
    input:checked + .slider {background:#28a745;}
    input:checked + .slider:before {transform:translateX(210px);}
    .slider span {position:absolute; top:50%; transform:translateY(-50%); font-size:32px; font-weight:bold; color:white;}
    .off {left:55px;} .on {right:55px; opacity:0;}
    input:checked + .slider .off {opacity:0;}
    input:checked + .slider .on {opacity:1;}

    button {width:260px; height:70px; font-size:24px; margin:8px; border:none; border-radius:10px; cursor:pointer;}
    .timer-btn {background:#ffc107; color:black;}
  </style>
</head>
<body>
  <h2>🔐 智能门禁控制</h2>
  
  <div id="status" class="status offline">● 设备离线</div>

  <p><strong>电控锁</strong></p>
  <label class="toggle-switch">
    <input type="checkbox" id="lockSwitch" onchange="handleLock(this)">
    <div class="slider">
      <span class="off">🔒 关闭</span>
      <span class="on">🔓 开门</span>
    </div>
  </label>

  <br><hr><br>
  <p><strong>💡 灯 1</strong></p>
  <button id="lampBtn" class="lamp-off" onclick="toggleLamp()">灯 1 关</button>

<br><br>
<p><strong>💡 灯 1 定时</strong></p>
<button onclick="timerLamp(5)">5分钟后关灯</button>
<button onclick="timerLamp(10)">10分钟后关灯</button>
<button onclick="timerLamp(30)">30分钟后关灯</button>

<script>
const client = mqtt.connect('wss://b7fea2bf.ala.asia-southeast1.emqxsl.com:8084/mqtt', {
  clientId: 'web_door_' + Math.random().toString(16).substr(2,8),
  username: 'eps8266nn',
  password: 'yu155414',
  will: {
    topic: 'home/esp8266/status',
    payload: 'OFFLINE',
    qos: 1,
    retain: true
  }
});

let lamp1State = false;

client.on('connect', () => {
  console.log("MQTT 已连接");
  client.subscribe('home/esp8266/status');
});

client.on('message', (topic, message) => {
  const msg = message.toString();
  
  if (msg === "LOCK_TRIGGERED" || msg === "ONLINE") {
    document.getElementById("status").className = "status online";
    document.getElementById("status").innerHTML = "● 设备在线";
  }
  if (msg === "OFFLINE") {
    document.getElementById("status").className = "status offline";
    document.getElementById("status").innerHTML = "● 设备离线";
  }

  if (msg === "ON1") {
    lamp1State = true;
    document.getElementById("lampBtn").textContent = "灯 1 开";
    document.getElementById("lampBtn").className = "lamp-on";
  }
  if (msg === "OFF1") {
    lamp1State = false;
    document.getElementById("lampBtn").textContent = "灯 1 关";
    document.getElementById("lampBtn").className = "lamp-off";
  }
});

function handleLock(cb) {
  if (cb.checked) {
    client.publish('home/esp8266/cmd', 'OPEN2');
    setTimeout(() => cb.checked = false, 800);
  }
}

function toggleLamp() {
  client.publish('home/esp8266/cmd', lamp1State ? 'OFF1' : 'ON1');
}

function timerLamp(minutes) {
if (confirm(确定要在 ${minutes} 分钟后自动关闭灯1吗？)) {
client.publish('home/esp8266/cmd', LAMP_TIMER_${minutes});
alert(已设置 ${minutes} 分钟后自动关灯);
}
}
</script>
</body>
</html>
